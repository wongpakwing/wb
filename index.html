<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>手寫畫板 (極簡版)</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: 20px;
        }
        /* 控制工具列 */
        .toolbar {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* 畫布的邊框和陰影 */
        #drawing-canvas {
            background-color: white;
            border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: crosshair; /* 設定滑鼠指標為十字 */
        }
    </style>
</head>
<body>

    <h1>手寫畫板</h1>

    <!-- 工具列 -->
    <div class="toolbar">
        <label for="brush-color">顏色:</label>
        <input type="color" id="brush-color" value="#000000">

        <label for="brush-size">粗細:</label>
        <input type="range" id="brush-size" min="1" max="100" value="5">
        
        <button id="clear-btn">清除畫布</button>
    </div>
