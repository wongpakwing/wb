<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手寫畫板 (滑鼠+觸控最終版)</title>
    <style>
        body {
            font-family: sans-serif; background-color: #f0f0f0;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding-top: 20px; touch-action: none; /* 防止觸控時頁面滾動 */
        }
        .toolbar {
            margin-bottom: 20px; display: flex; align-items: center; gap: 15px;
            background-color: white; padding: 10px 20px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #drawing-canvas {
            background-color: white; border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: crosshair;
        }
    </style>
</head>
<body>
    <h1>手寫畫板 (滑鼠+觸控最終版)</h1>
    <div class="toolbar">
        <label for="brush-color">顏色:</label>
        <input type="color" id="brush-color" value="#000000">
        <label for="brush-size">粗細:</label>
        <input type="range" id="brush-size" min="1" max="100" value="5">
        <button id="clear-btn">清除畫布</button>
    </div>
    <canvas id="drawing-canvas"></canvas>
    <script>
        window.addEventListener('load', () => {
            const canvas = document.getElementById('drawing-canvas');
            const ctx = canvas.getContext('2d');
            const colorPicker = document.getElementById('brush-color');
            const sizeSlider = document.getElementById('brush-size');
            const clearButton = document.getElementById('clear-btn');

            canvas.width = window.innerWidth * 0.9;
            canvas.height = window.innerHeight * 0.7;

            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;

            function getTouchPos(touchEvent) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: touchEvent.touches[0].clientX - rect.left,
                    y: touchEvent.touches[0].clientY - rect.top
                };
            }

            // --- 整合的開始繪圖函式 ---
            function startDrawing(e) {
                e.preventDefault();
                isDrawing = true;
                let pos;
                if (e.type === 'touchstart') {
                    pos = getTouchPos(e);
                } else { // mousedown
                    pos = { x: e.offsetX, y: e.offsetY };
                }
                [lastX, lastY] = [pos.x, pos.y];
            }
            
            // --- 整合的繪圖中函式 ---
            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                let pos;
                if (e.type === 'touchmove') {
                    pos = getTouchPos(e);
                } else { // mousemove
                    pos = { x: e.offsetX, y: e.offsetY };
                }

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = colorPicker.value;
                ctx.lineWidth = sizeSlider.value;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                [lastX, lastY] = [pos.x, pos.y];
            }

            // --- 整合的停止繪圖函式 ---
            function stopDrawing(e) {
                e.preventDefault();
                isDrawing = false;
            }

            // --- 綁定滑鼠事件 ---
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
