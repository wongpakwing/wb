<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的離線手寫畫板</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            touch-action: none; /* 防止觸控時頁面滾動 */
        }
        h1 {
            color: #333;
        }
        .toolbar {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            background-color: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #drawing-canvas {
            background-color: white;
            border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <h1>我的離線手寫畫板</h1>
    <div class="toolbar">
        <label for="brush-color">顏色:</label>
        <input type="color" id="brush-color" value="#000000">
        <label for="brush-size">粗細:</label>
        <input type="range" id="brush-size" min="1" max="100" value="5">
        <button id="clear-btn">清除畫布</button>
    </div>
    <canvas id="drawing-canvas"></canvas>
    <script>
        window.addEventListener('load', () => {
            const canvas = document.getElementById('drawing-canvas');
            const ctx = canvas.getContext('2d');
            const colorPicker = document.getElementById('brush-color');
            const sizeSlider = document.getElementById('brush-size');
            const clearButton = document.getElementById('clear-btn');

            canvas.width = window.innerWidth * 0.9;
            canvas.height = window.innerHeight * 0.7;

            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;

            function getCoordinates(e) {
                if (e.touches && e.touches.length > 0) {
                    const rect = canvas.getBoundingClientRect();
                    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                } else {
                    return { x: e.offsetX, y: e.offsetY };
                }
            }

            function start(e) {
                e.preventDefault();
                isDrawing = true;
                const pos = getCoordinates(e);
                [lastX, lastY] = [pos.x, pos.y];
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                const pos = getCoordinates(e);
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = colorPicker.value;
                ctx.lineWidth = sizeSlider.value;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                [lastX, lastY] = [pos.x, pos.y];
            }

            function stop(e) {
                e.preventDefault();
                isDrawing = false;
            }

            // --- 綁定滑鼠事件 ---
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stop);
            canvas.addEventListener('mouseout', stop);

            // --- 綁定觸控事件 ---
            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', stop);

            clearButton.addEventListener('click', () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
        });
    </script>
</body>
</html>
